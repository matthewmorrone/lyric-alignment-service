<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyric Player</title>
  <style>
    :root {
      --bg: #f5efe2;
      --panel: rgba(255, 252, 245, 0.78);
      --panel-strong: rgba(255, 251, 242, 0.92);
      --ink: #171717;
      --muted: #61584d;
      --accent: #d86c36;
      --accent-soft: rgba(216, 108, 54, 0.12);
      --line: rgba(23, 23, 23, 0.08);
      --shadow: 0 24px 80px rgba(63, 42, 20, 0.14);
      --radius: 28px;
      --radius-sm: 18px;
      --page-max: 1120px;
      --sans: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      --mono: "SF Mono", "JetBrains Mono", "Menlo", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(216, 108, 54, 0.16), transparent 28rem),
        radial-gradient(circle at 85% 15%, rgba(33, 96, 82, 0.14), transparent 26rem),
        linear-gradient(180deg, #f8f1e4 0%, #efe6d4 100%);
      font-family: var(--sans);
    }

    body {
      padding: 12px;
      overflow: hidden;
    }

    .shell {
      width: min(100%, var(--page-max));
      margin: 0 auto;
      display: grid;
      gap: 12px;
      height: calc(100vh - 24px);
    }

    .topbar,
    .lyrics {
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.48);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(0, 1fr) minmax(240px, 1.1fr);
      gap: 12px;
      align-items: center;
    }

    .brand {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .brand-kicker {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand-title {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(1.3rem, 2vw, 1.8rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .selector,
    .status {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }

    .selector label,
    .status-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    select,
    button,
    audio {
      width: 100%;
      font: inherit;
    }

    select {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fffdf9;
      color: var(--ink);
      padding: 14px 16px;
    }

    audio {
      margin-top: 10px;
      border-radius: 14px;
    }

    .time-readout {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }

    .current-line {
      min-height: 4.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4px 2px 0;
      font-family: var(--serif);
      font-size: clamp(1.2rem, 2.2vw, 2rem);
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .status-note {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.45;
    }

    .lyrics {
      padding: 14px;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .lyrics-header {
      padding: 4px 6px 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .lyrics-header h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .lyrics-header span {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 0.82rem;
    }

    .cue-list {
      display: grid;
      gap: 6px;
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .cue {
      appearance: none;
      border: 0;
      text-align: left;
      border-radius: 16px;
      background: transparent;
      color: inherit;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      transition: background-color 180ms ease, transform 180ms ease, color 180ms ease;
      cursor: pointer;
    }

    .cue:hover {
      background: rgba(255, 255, 255, 0.45);
      transform: translateX(2px);
    }

    .cue.active {
      background: var(--accent-soft);
      color: #8f3f19;
    }

    .cue-time {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      padding-top: 0.2rem;
    }

    .cue.active .cue-time {
      color: #8f3f19;
    }

    .cue-text {
      font-size: 1.02rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .empty {
      padding: 18px 14px 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .hint {
      padding: 0 4px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    @media (max-width: 820px) {
      body {
        padding: 10px;
        overflow: auto;
      }

      .shell {
        height: auto;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .cue {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .cue-list {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div class="brand">
        <div class="brand-kicker">Local Lyric Player</div>
        <h1 class="brand-title">Timed lyrics</h1>
      </div>

      <div class="selector">
        <label for="song-select">Song</label>
        <select id="song-select"></select>
        <audio id="player" controls preload="metadata"></audio>
        <div class="time-readout">
          <span id="current-time">00:00</span>
          <span id="duration">00:00</span>
        </div>
      </div>

      <div class="status">
        <div class="status-label">Now Singing</div>
        <div id="current-line" class="current-line">Select a track to begin.</div>
        <p id="status-note" class="status-note">
          Open this page through <code>python -m http.server</code> so the browser can load the subtitle files.
        </p>
      </div>
    </section>

    <section class="lyrics">
      <div class="lyrics-header">
        <h2>Lyric Sheet</h2>
        <span id="cue-count">0 lines</span>
      </div>
      <div id="cue-list" class="cue-list"></div>
      <p class="hint">
        Tip: click any lyric line to jump to that point in the song.
      </p>
    </section>
  </main>

  <script>
    const SONGS = [
      { title: "らしくいきましょ", audio: "songs/らしくいきましょ.mp3", srt: "songs/らしくいきましょ.srt" },
      { title: "キラリセーラードリーム", audio: "songs/キラリセーラードリーム.mp3", srt: "songs/キラリセーラードリーム.srt" },
      { title: "ハートムービング", audio: "songs/ハートムービング.mp3", srt: "songs/ハートムービング.srt" },
      { title: "ムーンライト電設", audio: "songs/ムーンライト電設.mp3", srt: "songs/ムーンライト電設.srt" },
      { title: "月色チャイのん", audio: "songs/月色チャイのん.mp3", srt: "songs/月色チャイのん.srt" },
      { title: "私たちになりたくて", audio: "songs/私たちになりたくて.mp3", srt: "songs/私たちになりたくて.srt" },
      { title: "負けない", audio: "songs/負けない.mp3", srt: "songs/負けない.srt" },
      { title: "風も空もきっと", audio: "songs/風も空もきっと.mp3", srt: "songs/風も空もきっと.srt" }
    ];

    const songSelect = document.getElementById("song-select");
    const player = document.getElementById("player");
    const cueList = document.getElementById("cue-list");
    const currentLine = document.getElementById("current-line");
    const currentTimeEl = document.getElementById("current-time");
    const durationEl = document.getElementById("duration");
    const cueCount = document.getElementById("cue-count");
    const statusNote = document.getElementById("status-note");

    let cues = [];
    let activeCueIndex = -1;
    let cueElements = [];

    function parseTimestamp(value) {
      const [hours, minutes, rest] = value.split(":");
      const [seconds, millis] = rest.split(",");
      return (Number(hours) * 3600) + (Number(minutes) * 60) + Number(seconds) + (Number(millis) / 1000);
    }

    function formatClock(value) {
      if (!Number.isFinite(value)) {
        return "00:00";
      }
      const minutes = Math.floor(value / 60);
      const seconds = Math.floor(value % 60);
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function parseSrt(text) {
      return text
        .trim()
        .split(/\n\s*\n/)
        .map(block => block.split("\n").map(line => line.trim()).filter(Boolean))
        .filter(lines => lines.length >= 3 && lines[1].includes(" --> "))
        .map(lines => {
          const [start, end] = lines[1].split(" --> ");
          return {
            start: parseTimestamp(start),
            end: parseTimestamp(end),
            text: lines.slice(2).join(" ")
          };
        });
    }

    function renderCues() {
      cueList.innerHTML = "";
      cueElements = [];
      cueCount.textContent = `${cues.length} lines`;

      if (!cues.length) {
        cueList.innerHTML = '<div class="empty">No timed lyric lines were loaded for this track.</div>';
        currentLine.textContent = "No subtitles loaded.";
        return;
      }

      const fragment = document.createDocumentFragment();
      cues.forEach((cue, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "cue";
        button.dataset.index = String(index);
        button.innerHTML = `
          <span class="cue-time">${formatClock(cue.start)}</span>
          <span class="cue-text">${cue.text}</span>
        `;
        button.addEventListener("click", () => {
          player.currentTime = cue.start;
          player.play().catch(() => {});
          syncLyrics();
        });
        cueElements.push(button);
        fragment.appendChild(button);
      });

      cueList.appendChild(fragment);
      activeCueIndex = -1;
      syncLyrics(true);
    }

    function findActiveCueIndex(time) {
      return cues.findIndex(cue => time >= cue.start && time < cue.end);
    }

    function syncLyrics(force = false) {
      currentTimeEl.textContent = formatClock(player.currentTime);
      const nextIndex = findActiveCueIndex(player.currentTime);

      if (!force && nextIndex === activeCueIndex) {
        return;
      }

      if (activeCueIndex >= 0 && cueElements[activeCueIndex]) {
        cueElements[activeCueIndex].classList.remove("active");
      }

      activeCueIndex = nextIndex;

      if (activeCueIndex >= 0 && cueElements[activeCueIndex]) {
        const activeElement = cueElements[activeCueIndex];
        activeElement.classList.add("active");
        currentLine.textContent = cues[activeCueIndex].text;
        activeElement.scrollIntoView({ block: "center", behavior: force ? "auto" : "smooth" });
      } else if (cues.length) {
        currentLine.textContent = "…";
      }
    }

    async function loadSong(index) {
      const song = SONGS[index];
      if (!song) {
        return;
      }

      activeCueIndex = -1;
      cues = [];
      cueList.innerHTML = '<div class="empty">Loading subtitles…</div>';
      currentLine.textContent = "Loading…";
      cueCount.textContent = "0 lines";
      statusNote.textContent = `Loaded audio: ${song.title}`;

      player.src = song.audio;
      player.load();

      try {
        const response = await fetch(song.srt);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        cues = parseSrt(await response.text());
        renderCues();
      } catch (error) {
        cueList.innerHTML = `<div class="empty">Could not load <code>${song.srt}</code>. Open this page with a local server such as <code>python -m http.server</code>.</div>`;
        currentLine.textContent = "Subtitle load failed.";
        statusNote.textContent = `Subtitle error: ${error.message}`;
      }
    }

    SONGS.forEach((song, index) => {
      const option = document.createElement("option");
      option.value = String(index);
      option.textContent = song.title;
      songSelect.appendChild(option);
    });

    songSelect.addEventListener("change", (event) => {
      loadSong(Number(event.target.value));
    });

    player.addEventListener("timeupdate", () => syncLyrics());
    player.addEventListener("seeked", () => syncLyrics(true));
    player.addEventListener("loadedmetadata", () => {
      durationEl.textContent = formatClock(player.duration);
      currentTimeEl.textContent = formatClock(player.currentTime);
    });
    player.addEventListener("ended", () => syncLyrics(true));

    loadSong(0);
  </script>
</body>
</html>
